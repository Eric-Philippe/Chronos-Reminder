name: Build Android App

# Produces two artifacts per run:
#   • chronos-release.apk  — signed APK, ready to sideload (share the link)
#   • chronos-release.aab  — signed App Bundle, ready to upload to Play Store
#
# Required secrets (Settings → Secrets → Actions):
#   KEYSTORE_B64        base64-encoded release keystore  (base64 -i release.jks)
#   KEYSTORE_PASSWORD   keystore password
#   KEY_ALIAS           key alias inside the keystore
#   KEY_PASSWORD        key password (often identical to KEYSTORE_PASSWORD)
#
# Optional secrets:
#   GOOGLE_SERVICES_JSON   contents of google-services.json (enables FCM in the build)
#
# Without the keystore secrets the build still runs and produces an
# unsigned APK/AAB (useful for smoke-testing).

on:
  push:
    branches: [main]
    paths:
      - "mobile/android/**"
      - "constants.yaml"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release with the artifacts"
        type: boolean
        default: false

jobs:
  build-release:
    name: Build & sign release artifacts
    runs-on: ubuntu-latest
    env:
      HAS_GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_B64 != '' }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle.kts', 'mobile/android/**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Firebase: write google-services.json (optional) ─────────────────────
      - name: Write google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > mobile/android/app/google-services.json

      # ── Signing: decode keystore (optional) ─────────────────────────────────
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_B64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > mobile/android/app/release.jks
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/mobile/android/app/release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"             >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                             >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"                       >> $GITHUB_ENV

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build release AAB (Play Store bundle)
        working-directory: mobile/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # ── Rename artifacts ─────────────────────────────────────────────────────
      - name: Collect artifacts
        run: |
          VERSION=$(grep 'versionName' mobile/android/app/build.gradle.kts \
                    | grep -oP '"\K[^"]+')
          mkdir -p dist
          cp mobile/android/app/build/outputs/apk/release/app-release*.apk \
             dist/chronos-v${VERSION}.apk
          cp mobile/android/app/build/outputs/bundle/release/app-release*.aab \
             dist/chronos-v${VERSION}.aab
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload APK (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: chronos-release-apk
          path: dist/chronos-v${{ env.VERSION }}.apk
          retention-days: 30

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: chronos-release-aab
          path: dist/chronos-v${{ env.VERSION }}.aab
          retention-days: 30

      # ── GitHub Release (only on manual dispatch with publish_release=true) ───
      - name: Create GitHub Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "Chronos Android v${{ env.VERSION }}"
          draft: true
          files: |
            dist/chronos-v${{ env.VERSION }}.apk
            dist/chronos-v${{ env.VERSION }}.aab
          body: |
            ## Chronos Reminder v${{ env.VERSION }} — Android

            ### Install
            - **Sideload (direct install):** download the `.apk` and open it on your device
            - **Play Store:** upload the `.aab` via the Google Play Console

            ---
            *Built by GitHub Actions from commit ${{ github.sha }}*
